<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <!--Utilização do defer para ele carregar o JS junto do HTML
    mas fazendo ele funcionar apenas no final-->
    <script src="./main.js" defer></script>
    <!--O script DEVE ser rodado no head utilizando a palavra defer-->
    <title>Trocar Cor</title>
</head>
<body class="cor">
    <input type="text" id="cor">
    <!-- id - identificação única. Toda vez que eu quiser manipular um objt, coloco id-->
    <button id="trocar-cor">Trocar COR</button> 
    <!--<script src="./main.js"></script>  Não é mais usado no final.-->
</body>
</html>
